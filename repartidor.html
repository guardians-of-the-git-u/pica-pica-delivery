<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repartidor | Pica Pica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="app-header__title">Panel de Repartidor</h1>
            <p class="app-header__greeting">Gestiona tus entregas del día</p>
        </header>

        <main class="px-page py-2">
            <section class="card mb-2" style="padding: 15px;">
                <label>Tu estado actual:</label>
                <select id="status-repartidor" onchange="cambiarMiDisponibilidad()">
                    <option value="Disponible">Disponible ✅</option>
                    <option value="No Disponible">No Disponible ⏸️</option>
                </select>
            </section>

            <section id="repartidor-orders-container">
                <h2>Pedidos Asignados</h2>
                <div id="listado-pedidos-repartidor">
                    <p class="text-muted">Cargando tus pedidos...</p>
                </div>
            </section>
            <section id="pedidos-disponibles-container">
    <h2>Pedidos Disponibles para Tomar</h2>
    <div id="listado-pedidos-libres">
        <p class="text-muted">Buscando pedidos disponibles...</p>
    </div>
                
</section>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // ID del repartidor (Esto deberías obtenerlo de un login o parámetro)
        const MI_ID_REPARTIDOR = "R001"; 

        async function cargarPedidosRepartidor() {
    const containerMisPedidos = document.getElementById('listado-pedidos-repartidor');
    const containerLibres = document.getElementById('listado-pedidos-libres');
    
    const todosLosPedidos = await obtenerPedidos();
    
    // Filtro 1: Pedidos que ya me asignaron
    const misPedidos = todosLosPedidos.filter(p => p.ID_Repartidor === MI_ID_REPARTIDOR && p.Estado_Entrega !== 'Entregado');
    
    // Filtro 2: Pedidos sin dueño (o con ID vacío)
    const pedidosLibres = todosLosPedidos.filter(p => (!p.ID_Repartidor || p.ID_Repartidor === "") && p.Estado_Entrega === 'Pendiente');

    // Renderizar Mis Pedidos... (tu código actual)
    
    // Renderizar Pedidos Libres
    containerLibres.innerHTML = pedidosLibres.map(p => `
        <div class="card mb-2" style="border: 2px solid var(--color-primary); padding:15px;">
            <h3>${p.Nombre_Plato}</h3>
            <p>Cliente: ${p.Nombre_Cliente}</p>
            <button class="btn-primary" onclick="tomarPedido('${p.ID_Pedido}')">Aceptar Pedido</button>
        </div>
    `).join('');
}

        async function marcarEntregado(idPedido) {
            await completarEntrega(idPedido, MI_ID_REPARTIDOR);
            alert("¡Pedido entregado con éxito!");
            cargarPedidosRepartidor();
        }
        async function tomarPedido(idPedido) {
    // 1. Actualizamos el pedido con el ID del repartidor actual
    // Usamos el endpoint que ya tienes en script.js
    try {
        const res = await fetch(`${API_URL}/ID_Pedido/${idPedido}?sheet=Pedidos`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ data: { 
                ID_Repartidor: MI_ID_REPARTIDOR,
                Estado_Entrega: "En Camino"
            }})
        });
        
        // 2. Marcamos al repartidor como "No Disponible" porque ya está ocupado
        await actualizarDisponibilidadRepartidor(MI_ID_REPARTIDOR, "No Disponible");
        document.getElementById('status-repartidor').value = "No Disponible";
        
        alert("¡Pedido tomado! Ahora dirígete al restaurante.");
        cargarPedidosRepartidor(); // Recargar ambas listas
    } catch (error) {
        alert("Error al tomar el pedido.");
    }
}

        async function cambiarMiDisponibilidad() {
            const nuevoEstado = document.getElementById('status-repartidor').value;
            await actualizarDisponibilidadRepartidor(MI_ID_REPARTIDOR, nuevoEstado);
            alert("Estado actualizado a: " + nuevoEstado);
        }

        document.addEventListener('DOMContentLoaded', cargarPedidosRepartidor);
    </script>
</body>
</html>
