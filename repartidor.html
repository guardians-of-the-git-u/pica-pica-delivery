<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Repartidor (HU5)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      padding: 15px;
    }
    .tarjeta-pedido {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    .direccion {
      font-size: 1.2rem;
      font-weight: bold;
      color: #333;
    }
    .tiempo-estimado {
      color: #e67e22;
      font-weight: bold;
      margin: 10px 0;
    }
    /* Botón Gigante solicitado en la HU5 */
    .btn-entregado {
      display: block;
      width: 100%;
      background-color: #2ecc71;
      color: white;
      border: none;
      padding: 20px;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 4px 10px rgba(46, 204, 113, 0.4);
    }
    .btn-entregado:active {
      background-color: #27ae60;
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <h1>Mis Entregas en Bici 🚲</h1>

  <!-- Lista de Pedidos Asignados -->
  <div id="contenedor-pedidos">
    <!-- El código JavaScript renderizará el pedido aquí -->
  </div>

<script>
// Datos del pedido asignado (Simulación de lo recibido desde el Admin)
const pedidoAsignado = {
  id: 101,
  direccion: "Av. Principal 123, Barrio Central",
  distanciaKm: 3 // Este es el dato de distancia que mencionas vigilar
};

// Lógica para calcular el tiempo estimado (HU5)
// Fórmula: distancia * 5 minutos + 10 minutos de cocina
function calcularTiempoEstimado(distancia) {
  const tiempoCocina = 10;
  const tiempoPorKm = 5;
  return (distancia * tiempoPorKm) + tiempoCocina;
}

// Renderizar la vista del repartidor
function cargarVistaRepartidor() {
  const contenedor = document.getElementById("contenedor-pedidos");
  const tiempoTotal = calcularTiempoEstimado(pedidoAsignado.distanciaKm);

  contenedor.innerHTML = `
    <div class="tarjeta-pedido" id="tarjeta-${pedidoAsignado.id}">
      <h3>Pedido #${pedidoAsignado.id}</h3>
      <p class="direccion">📍 Dirección: ${pedidoAsignado.direccion}</p>
      <p>Distancia: ${pedidoAsignado.distanciaKm} km</p>
      <p class="tiempo-estimado">⏱️ Tiempo Estimado: ${tiempoTotal} min (Cocina + Viaje)</p>
      
      <!-- Botón Gigante -->
      <button class="btn-entregado" onclick="marcarComoEntregado(${pedidoAsignado.id})">
        Marcar como Entregado
      </button>
    </div>
  `;
}

// Acción del botón gigante (HU5)
function marcarComoEntregado(idPedido) {
  alert(`¡Buen trabajo! El pedido #${idPedido} ha sido marcado como entregado.`);
  
  // Ocultar o limpiar la pantalla tras entregar
  document.getElementById(`tarjeta-${idPedido}`).innerHTML = "<h3>¡No tienes pedidos pendientes por ahora! 🌟</h3>";
}

// Inicializar la vista al cargar la página
window.onload = cargarVistaRepartidor;
</script>

</body>
</html>
